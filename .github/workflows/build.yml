# =============================================================================
# SALES PORTAL - Build and Push Docker Image
# =============================================================================
# Builds the application container and pushes to GitHub Container Registry.
# Triggered on:
#   - Push to dev branch   -> build + auto-deploy the Azure dev env (staging)
#   - Push to main branch  -> build the prod-candidate image (no deploy)
#   - Version tags         -> build a release/hotfix image (no deploy)
#   - Manual dispatch      -> used by dev-sync.yml to build the rebuilt dev branch
#
# Images are content-addressed per commit (sha-<commit>). deploy.yml never
# builds; it promotes an already-built image to an environment, so prod runs the
# exact artifact built and tested. We therefore build per integrated commit, not
# per branch: the production branch is not a build trigger because at release it
# points at a main commit whose image already exists. A hotfix is the one new
# prod-bound commit, and it gets a single build via its v* tag.
# =============================================================================

name: Build

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
    # No paths filter on purpose: a push to dev or main always builds, so the
    # "push builds" contract is never silently skipped by a docs-only commit.
    # Docker layer caching keeps redundant builds cheap.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch name (sanitized)
            type=ref,event=branch
            # Git tag
            type=ref,event=tag
            # Short SHA
            type=sha,prefix=sha-
            # Latest tag for main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Semantic version tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

  # ---------------------------------------------------------------------------
  # Auto-deploy: trigger deploy workflow after successful build
  # Uses gh CLI to dispatch since workflow_call has permission limitations
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Dev
    needs: build
    # Auto-deploy the dev branch only, to the Azure dev environment (staging).
    # A push to main builds a prod-candidate image but never auto-deploys. Prod
    # is always a deliberate manual Deploy run that promotes an already-built
    # sha image (from the production branch or a hotfix tag), so nothing reaches
    # production automatically. This condition is also true for the
    # workflow_dispatch that dev-sync.yml fires against the dev ref.
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger dev deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml \
            --repo ${{ github.repository }} \
            --ref dev \
            --field environment=dev
