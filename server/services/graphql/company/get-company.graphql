query GetCompany($channelId: String, $languageId: String, $marketId: String) {
  getCompany(channelId: $channelId, languageId: $languageId, marketId: $marketId) {
    id
    name
    vatNumber
    exVat
    limitedProductAccess
    addresses {
      addressId
      companyId
      email
      phone
      company
      firstName
      lastName
      careOf
      addressLine1
      addressLine2
      addressLine3
      zip
      city
      region
      country
      addressType
      addressReferenceId
    }
    buyers {
      id
      firstName
      lastName
      phone
      companyId
      active
      restrictToDedicatedPriceLists
    }
  }
}
