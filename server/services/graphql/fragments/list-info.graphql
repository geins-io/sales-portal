fragment ListInfo on PageInfoType {
  alias
  canonicalUrl
  alternativeUrls {
    language
    culture
    country
    url
    channelId
  }
  primaryImage
  name
  id
  primaryDescription
  secondaryDescription
  hideTitle
  hideDescription
  logo
  meta {
    ...Meta
  }
  subCategories {
    name
    alias
    canonicalUrl
  }
}
