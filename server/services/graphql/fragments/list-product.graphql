fragment ListProduct on ProductType {
  brand {
    name
  }
  name
  productId
  articleNumber
  alias
  canonicalUrl
  unitPrice {
    ...Price
  }
  productImages {
    fileName
  }
  discountCampaigns {
    ...Campaign
  }
  primaryCategory {
    name
  }
  totalStock {
    ...Stock
  }
  skus {
    ...Sku
  }
  lowestPrice {
    lowestPriceIncVat
    lowestPriceIncVatFormatted
    lowestPriceExVat
    lowestPriceExVatFormatted
    comparisonPriceIncVat
    comparisonPriceIncVatFormatted
    comparisonPriceExVat
    comparisonPriceExVatFormatted
    isDiscounted
    discountPercentage
  }
  discountType
}
