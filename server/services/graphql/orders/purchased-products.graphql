query getCompanyOrdersForPurchasedProducts(
  $channelId: String
  $languageId: String
  $marketId: String
) {
  getCompanyOrders(channelId: $channelId, languageId: $languageId, marketId: $marketId) {
    id
    publicId
    createdAt
    customerEmail
    billingAddress {
      firstName
      lastName
    }
    cart {
      items {
        quantity
        unitPrice {
          sellingPriceExVat
          sellingPriceExVatFormatted
        }
        product {
          articleNumber
          name
          alias
          productImages {
            fileName
          }
        }
      }
    }
  }
}
