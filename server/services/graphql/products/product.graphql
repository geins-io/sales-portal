query product(
  $alias: String!
  $channelId: String
  $languageId: String
  $marketId: String
) {
  product(
    alias: $alias
    channelId: $channelId
    languageId: $languageId
    marketId: $marketId
  ) {
    productId
    articleNumber
    alias
    canonicalUrl
    alternativeUrls {
      language
      culture
      country
      url
      channelId
    }
    name
    brand {
      name
      alias
      canonicalUrl
    }
    # Storefront ProductImageType exposes only fileName and tags (no per-image alt field).
    # Alt text is generated client-side from product name + position (see useProductImageAlt).
    productImages {
      fileName
    }
    primaryCategory {
      name
      alias
      canonicalUrl
    }
    unitPrice {
      ...Price
    }
    texts {
      text1
      text2
      text3
    }
    parameterGroups {
      name
      parameterGroupId
      parameters {
        name
        value
        show
        identifier
      }
    }
    skus {
      ...Sku
    }
    totalStock {
      ...Stock
    }
    variantDimensions {
      dimension
      value
      level
      label
    }
    meta {
      ...Meta
    }
    variantGroup {
      variants {
        variants {
          variants {
            ...Variant
          }
          ...Variant
        }
        ...Variant
      }
    }
    discountCampaigns {
      ...Campaign
    }
    lowestPrice {
      lowestPriceIncVat
      lowestPriceIncVatFormatted
      lowestPriceExVat
      lowestPriceExVatFormatted
      comparisonPriceIncVat
      comparisonPriceIncVatFormatted
      comparisonPriceExVat
      comparisonPriceExVatFormatted
      isDiscounted
      discountPercentage
    }
    discountType
    rating {
      score
      voteCount
    }
  }
}
