query getQuotationCart($quotationId: Guid!, $languageId: String) {
  getQuotationCart(quotationId: $quotationId, languageId: $languageId) {
    id
    items {
      ...QuotationCartItem
    }
    summary {
      ...QuotationCartSummary
    }
    quotation {
      ...QuotationWithAddresses
    }
  }
}
