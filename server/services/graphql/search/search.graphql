query products(
  $skip: Int = null
  $take: Int = null
  $filter: FilterInputType = null
  $channelId: String
  $languageId: String
  $marketId: String
) {
  products(
    skip: $skip
    take: $take
    filter: $filter
    channelId: $channelId
    languageId: $languageId
    marketId: $marketId
  ) {
    products {
      brand {
        name
        alias
        canonicalUrl
      }
      categories {
        name
        alias
        canonicalUrl
      }
      name
      productId
      alias
      canonicalUrl
      unitPrice {
        ...Price
      }
      productImages {
        fileName
      }
    }
    count
  }
}
